version: 2

models:
  - name: push_events
    description: "Push events for each repository"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - repo_id
            - event_date
    columns:
      - name: repo_id
        data_type: bigint
        description: "Unique identifier for the repository"
        data_tests:
          - not_null

      - name: repo_name
        data_type: string
        description: "Name of the repository"

      - name: event_date
        data_type: date
        description: "Date of the push event"
        data_tests:
          - not_null

      - name: push_events
        data_type: bigint
        description: "Count of push events"
        data_tests:
          - not_null

      - name: commits_pushed
        data_type: double
        description: "Number of commits pushed"
        data_tests:
          - not_null